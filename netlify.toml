[build]
  publish = "."
  command = "node scripts/generate-manifest.js"
  # ignore = "git diff --quiet HEAD^ HEAD -- ':!data'"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Headers for CORS (fetching JSON data)
[[headers]]
  for = "/*.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300, must-revalidate"

# Headers for assets upload
[[headers]]
  for = "/uploads/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for admin panel security
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none'"

# SPA fallback for article pages
[[redirects]]
  from = "/artikel/*"
  to = "/article.html"
  status = 200
